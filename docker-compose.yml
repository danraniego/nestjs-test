version: '3.8'

services:
  database:
    image: postgres:latest
    container_name: nestjs_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/init-app-role.sql:/docker-entrypoint-initdb.d/init-app-role.sql

volumes:
  postgres_data: